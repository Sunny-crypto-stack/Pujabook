<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#4f46e5"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="g" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#g)"/>

  <!-- Arrow / flow icon — upward trending arrow -->
  <polyline
    points="90,280 160,200 220,240 310,130"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
  <!-- Arrowhead -->
  <polyline
    points="270,118 312,128 302,170"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- "LF" text below icon -->
  <text
    x="200"
    y="348"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="white"
    text-anchor="middle"
    opacity="0.95"
    letter-spacing="6"
  >LEADFLOW</text>
</svg>
